controller:
  replicaCount: 1

  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  # Tolerate control-plane taint so the controller can schedule there if needed
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
