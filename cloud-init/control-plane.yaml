#cloud-config
package_update: true
package_upgrade: false

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg

write_files:
  - path: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
  - path: /etc/sysctl.d/k8s.conf
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1

runcmd:
  # Désactiver le swap
  - swapoff -a
  - sed -i '/ swap / s/^/#/' /etc/fstab

  # Charger les modules noyau
  - modprobe overlay
  - modprobe br_netfilter
  - sysctl --system

  # Installer containerd
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" | tee /etc/apt/sources.list.d/docker.list
  - apt-get update -y
  - apt-get install -y containerd.io

  # Configurer containerd avec le cgroup driver systemd
  - mkdir -p /etc/containerd
  - containerd config default | tee /etc/containerd/config.toml
  - sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
  - systemctl daemon-reload
  - systemctl enable --now containerd
  - mkdir -p /etc
  - |
    cat >/etc/crictl.yaml <<'EOF'
    runtime-endpoint: unix:///run/containerd/containerd.sock
    image-endpoint: unix:///run/containerd/containerd.sock
    timeout: 10
    debug: false
    EOF
  - systemctl restart containerd
  - until crictl info >/dev/null 2>&1; do sleep 5; done

  # Installer kubeadm, kubelet, kubectl
  - curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  - echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /' | tee /etc/apt/sources.list.d/kubernetes.list
  - apt-get update -y
  - apt-get install -y kubelet kubeadm kubectl
  - apt-mark hold kubelet kubeadm kubectl
  - systemctl enable kubelet

  # Initialiser le control plane Kubernetes
  - >
    kubeadm init
    --token "${kubeadm_token}"
    --token-ttl 0
    --pod-network-cidr=${pod_network_cidr}
    --apiserver-advertise-address=${control_plane_private_ip}
    --cri-socket=unix:///run/containerd/containerd.sock

  # Configurer kubectl pour l'utilisateur admin
  - mkdir -p /home/${admin_username}/.kube
  - cp /etc/kubernetes/admin.conf /home/${admin_username}/.kube/config
  - chown -R ${admin_username}:${admin_username} /home/${admin_username}/.kube

  # Attendre que le nœud CP soit Ready avant de déployer Flannel
  - until kubectl --kubeconfig=/etc/kubernetes/admin.conf get nodes | grep -q " Ready"; do sleep 5; done

  # Installer le CNI Flannel
  - kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml
