name: terraform
run-name: terraform - ${{ github.event_name == 'workflow_dispatch' && inputs.terraform_action || github.event_name }}

on:
  pull_request:
    paths:
      - "*.tf"
      - "cloud-init/**"
      - "scripts/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - master
      - dev
    paths:
      - "*.tf"
      - "cloud-init/**"
      - "scripts/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Action Terraform a executer"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      tf_vars_file:
        description: "Fichier tfvars optionnel (ex: terraform.tfvars)"
        required: false
        type: string
        default: ""
      confirm_destroy:
        description: "Tape DESTROY pour autoriser terraform destroy"
        required: false
        type: string
        default: ""

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform_checks:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Lint
        run: |
          tflint --init
          tflint -f compact

  terraform_plan:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TFSTATE_RESOURCE_GROUP_NAME: ${{ secrets.TFSTATE_RESOURCE_GROUP_NAME }}
      TFSTATE_STORAGE_ACCOUNT_NAME: ${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}
      TFSTATE_CONTAINER_NAME: ${{ secrets.TFSTATE_CONTAINER_NAME }}
      TFSTATE_KEY: ${{ secrets.TFSTATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate backend secrets
        run: |
          test -n "$TFSTATE_RESOURCE_GROUP_NAME" || { echo "Missing secret TFSTATE_RESOURCE_GROUP_NAME"; exit 1; }
          test -n "$TFSTATE_STORAGE_ACCOUNT_NAME" || { echo "Missing secret TFSTATE_STORAGE_ACCOUNT_NAME"; exit 1; }
          test -n "$TFSTATE_CONTAINER_NAME" || { echo "Missing secret TFSTATE_CONTAINER_NAME"; exit 1; }
          test -n "$TFSTATE_KEY" || { echo "Missing secret TFSTATE_KEY"; exit 1; }

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER_NAME}" \
            -backend-config="key=${TFSTATE_KEY}"

      - name: Terraform Validate
        run: terraform validate

      - name: Import existing bootstrap resources
        run: |
          rg_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${TFSTATE_RESOURCE_GROUP_NAME}"
          sa_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${TFSTATE_RESOURCE_GROUP_NAME}/providers/Microsoft.Storage/storageAccounts/${TFSTATE_STORAGE_ACCOUNT_NAME}"
          container_id="https://${TFSTATE_STORAGE_ACCOUNT_NAME}.blob.core.windows.net/${TFSTATE_CONTAINER_NAME}"
          sa_suffix="${TFSTATE_STORAGE_ACCOUNT_NAME##*tfstate}"

          if ! terraform state list | grep -qx 'azurerm_resource_group.rg'; then
            terraform import azurerm_resource_group.rg "$rg_id"
          fi

          if ! terraform state list | grep -qx 'azurerm_storage_account.tfstate'; then
            terraform import azurerm_storage_account.tfstate "$sa_id"
          fi

          if ! terraform state list | grep -qx 'azurerm_storage_container.tfstate'; then
            terraform import azurerm_storage_container.tfstate "$container_id"
          fi

          if ! terraform state list | grep -qx 'random_string.tfstate_sa_suffix'; then
            terraform import random_string.tfstate_sa_suffix "$sa_suffix"
          fi

      - name: Build tfvars argument
        id: args
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tf_vars_file }}" ]; then
            echo "var_file_arg=-var-file=${{ inputs.tf_vars_file }}" >> "$GITHUB_OUTPUT"
          else
            echo "var_file_arg=" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Plan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.terraform_action }}" = "destroy" ]; then
            terraform plan -destroy ${{ steps.args.outputs.var_file_arg }} -out=tfplan
          else
            terraform plan ${{ steps.args.outputs.var_file_arg }} -out=tfplan
          fi

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: tfplan
          if-no-files-found: error

  terraform_apply:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'apply')
    needs: terraform_plan
    runs-on: ubuntu-latest
    environment: terraform-apply
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TFSTATE_RESOURCE_GROUP_NAME: ${{ secrets.TFSTATE_RESOURCE_GROUP_NAME }}
      TFSTATE_STORAGE_ACCOUNT_NAME: ${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}
      TFSTATE_CONTAINER_NAME: ${{ secrets.TFSTATE_CONTAINER_NAME }}
      TFSTATE_KEY: ${{ secrets.TFSTATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate backend secrets
        run: |
          test -n "$TFSTATE_RESOURCE_GROUP_NAME" || { echo "Missing secret TFSTATE_RESOURCE_GROUP_NAME"; exit 1; }
          test -n "$TFSTATE_STORAGE_ACCOUNT_NAME" || { echo "Missing secret TFSTATE_STORAGE_ACCOUNT_NAME"; exit 1; }
          test -n "$TFSTATE_CONTAINER_NAME" || { echo "Missing secret TFSTATE_CONTAINER_NAME"; exit 1; }
          test -n "$TFSTATE_KEY" || { echo "Missing secret TFSTATE_KEY"; exit 1; }

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER_NAME}" \
            -backend-config="key=${TFSTATE_KEY}"

      - name: Terraform Validate
        run: terraform validate

      - name: Import existing bootstrap resources
        run: |
          rg_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${TFSTATE_RESOURCE_GROUP_NAME}"
          sa_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${TFSTATE_RESOURCE_GROUP_NAME}/providers/Microsoft.Storage/storageAccounts/${TFSTATE_STORAGE_ACCOUNT_NAME}"
          container_id="https://${TFSTATE_STORAGE_ACCOUNT_NAME}.blob.core.windows.net/${TFSTATE_CONTAINER_NAME}"
          sa_suffix="${TFSTATE_STORAGE_ACCOUNT_NAME##*tfstate}"

          if ! terraform state list | grep -qx 'azurerm_resource_group.rg'; then
            terraform import azurerm_resource_group.rg "$rg_id"
          fi

          if ! terraform state list | grep -qx 'azurerm_storage_account.tfstate'; then
            terraform import azurerm_storage_account.tfstate "$sa_id"
          fi

          if ! terraform state list | grep -qx 'azurerm_storage_container.tfstate'; then
            terraform import azurerm_storage_container.tfstate "$container_id"
          fi

          if ! terraform state list | grep -qx 'random_string.tfstate_sa_suffix'; then
            terraform import random_string.tfstate_sa_suffix "$sa_suffix"
          fi

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Rebuild fresh plan
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.terraform_action }}" = "destroy" ]; then
            terraform plan -destroy ${{ steps.args.outputs.var_file_arg }} -out=tfplan
          else
            terraform plan ${{ steps.args.outputs.var_file_arg }} -out=tfplan
          fi

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

  terraform_destroy:
    if: github.event_name == 'workflow_dispatch' && inputs.terraform_action == 'destroy'
    needs: terraform_plan
    runs-on: ubuntu-latest
    environment: terraform-destroy
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      TFSTATE_RESOURCE_GROUP_NAME: ${{ secrets.TFSTATE_RESOURCE_GROUP_NAME }}
      TFSTATE_STORAGE_ACCOUNT_NAME: ${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}
      TFSTATE_CONTAINER_NAME: ${{ secrets.TFSTATE_CONTAINER_NAME }}
      TFSTATE_KEY: ${{ secrets.TFSTATE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Guardrail destroy confirmation
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "Destroy bloque: renseigne confirm_destroy=DESTROY"
            exit 1
          fi

      - name: Validate backend secrets
        run: |
          test -n "$TFSTATE_RESOURCE_GROUP_NAME" || { echo "Missing secret TFSTATE_RESOURCE_GROUP_NAME"; exit 1; }
          test -n "$TFSTATE_STORAGE_ACCOUNT_NAME" || { echo "Missing secret TFSTATE_STORAGE_ACCOUNT_NAME"; exit 1; }
          test -n "$TFSTATE_CONTAINER_NAME" || { echo "Missing secret TFSTATE_CONTAINER_NAME"; exit 1; }
          test -n "$TFSTATE_KEY" || { echo "Missing secret TFSTATE_KEY"; exit 1; }

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="resource_group_name=${TFSTATE_RESOURCE_GROUP_NAME}" \
            -backend-config="storage_account_name=${TFSTATE_STORAGE_ACCOUNT_NAME}" \
            -backend-config="container_name=${TFSTATE_CONTAINER_NAME}" \
            -backend-config="key=${TFSTATE_KEY}"

      - name: Terraform Validate
        run: terraform validate

      - name: Import existing bootstrap resources
        run: |
          rg_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${TFSTATE_RESOURCE_GROUP_NAME}"
          sa_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${TFSTATE_RESOURCE_GROUP_NAME}/providers/Microsoft.Storage/storageAccounts/${TFSTATE_STORAGE_ACCOUNT_NAME}"
          container_id="https://${TFSTATE_STORAGE_ACCOUNT_NAME}.blob.core.windows.net/${TFSTATE_CONTAINER_NAME}"
          sa_suffix="${TFSTATE_STORAGE_ACCOUNT_NAME##*tfstate}"

          if ! terraform state list | grep -qx 'azurerm_resource_group.rg'; then
            terraform import azurerm_resource_group.rg "$rg_id"
          fi

          if ! terraform state list | grep -qx 'azurerm_storage_account.tfstate'; then
            terraform import azurerm_storage_account.tfstate "$sa_id"
          fi

          if ! terraform state list | grep -qx 'azurerm_storage_container.tfstate'; then
            terraform import azurerm_storage_container.tfstate "$container_id"
          fi

          if ! terraform state list | grep -qx 'random_string.tfstate_sa_suffix'; then
            terraform import random_string.tfstate_sa_suffix "$sa_suffix"
          fi

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      - name: Terraform Apply Destroy Plan
        run: terraform apply -auto-approve tfplan

      - name: Upload errored state artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-errored-state
          path: errored.*
          if-no-files-found: ignore
