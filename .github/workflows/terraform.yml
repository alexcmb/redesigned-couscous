name: terraform

on:
  pull_request:
    paths:
      - "terraform/*.tf"
      - "terraform/**/*.tf"
      - "terraform/cloud-init/**"
      - "terraform/scripts/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/*.tf"
      - "terraform/**/*.tf"
      - "terraform/cloud-init/**"
      - "terraform/scripts/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      run_hardening:
        description: "Run OS hardening over SSH"
        required: true
        type: boolean
        default: false
      target_hosts:
        description: "Comma-separated public IPs or hostnames"
        required: false
        type: string
        default: "40.89.191.220,20.199.118.187,20.19.122.218"
      ssh_user:
        description: "SSH username used on target hosts"
        required: false
        type: string
        default: "adminuser"

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform_checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: terraform
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Init
        run: terraform init -backend=false -input=false

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Lint
        run: |
          tflint --init
          tflint -f compact

  hardening:
    if: github.event_name == 'workflow_dispatch' && inputs.run_hardening
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          test -n "$SSH_PRIVATE_KEY" || { echo "Missing SSH_PRIVATE_KEY secret"; exit 1; }
          mkdir -p .ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > .ssh/id_rsa
          chmod 600 .ssh/id_rsa

      - name: Run hardening
        env:
          TARGET_HOSTS: ${{ inputs.target_hosts }}
          SSH_USER: ${{ inputs.ssh_user }}
        run: |
          test -n "$TARGET_HOSTS" || { echo "target_hosts input is required"; exit 1; }
          IFS=',' read -ra HOSTS <<< "$TARGET_HOSTS"
          for host in "${HOSTS[@]}"; do
            host_trimmed="$(echo "$host" | xargs)"
            test -n "$host_trimmed" || continue
            bash terraform/scripts/harden-node.sh "$host_trimmed" "$SSH_USER" .ssh/id_rsa
          done