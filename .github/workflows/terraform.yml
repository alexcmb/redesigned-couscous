name: terraform

on:
  pull_request:
    paths:
      - "*.tf"
      - "cloud-init/**"
      - "scripts/**"
      - ".github/workflows/terraform.yml"
  push:
    branches:
      - master
    paths:
      - "*.tf"
      - "cloud-init/**"
      - "scripts/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Action Terraform a executer"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      auto_approve:
        description: "Auto-approve pour apply/destroy"
        required: true
        type: boolean
        default: false
      tf_vars_file:
        description: "Fichier tfvars optionnel (ex: terraform.tfvars)"
        required: false
        type: string
        default: ""
      confirm_destroy:
        description: "Tape DESTROY pour autoriser terraform destroy"
        required: false
        type: string
        default: ""

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform_checks:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Fmt
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Lint
        run: |
          tflint --init
          tflint -f compact

  terraform_pipeline:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .
    env:
      TF_IN_AUTOMATION: true
      TF_INPUT: false
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Build tfvars argument
        id: args
        run: |
          if [ -n "${{ inputs.tf_vars_file }}" ]; then
            echo "var_file_arg=-var-file=${{ inputs.tf_vars_file }}" >> "$GITHUB_OUTPUT"
          else
            echo "var_file_arg=" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Plan (create/update)
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == 'apply'
        run: terraform plan ${{ steps.args.outputs.var_file_arg }} -out=tfplan

      - name: Terraform Apply
        if: inputs.terraform_action == 'apply'
        run: |
          if [ "${{ inputs.auto_approve }}" = "true" ]; then
            terraform apply -auto-approve tfplan
          else
            terraform apply tfplan
          fi

      - name: Guardrail destroy confirmation
        if: inputs.terraform_action == 'destroy'
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "Destroy bloque: renseigne confirm_destroy=DESTROY"
            exit 1
          fi

      - name: Terraform Destroy
        if: inputs.terraform_action == 'destroy'
        run: |
          if [ "${{ inputs.auto_approve }}" = "true" ]; then
            terraform destroy -auto-approve ${{ steps.args.outputs.var_file_arg }}
          else
            terraform destroy ${{ steps.args.outputs.var_file_arg }}
          fi